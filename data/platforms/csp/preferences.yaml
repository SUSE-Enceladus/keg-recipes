preferences:
  type:
    _attributes:
      bootpartition: "false"
      btrfs_quota_groups: "true"
      btrfs_root_is_snapshot: "true"
      devicepersistency: by-label
      filesystem: btrfs
      firmware: uefi
      kernelcmdline:
        security: selinux
        selinux: 1
      image: oem
      kernelcmdline:
        console: ttyS0
        net.ifnames: 0
    bootloader:
      _attributes:
        name: grub2
        timeout: 1
    size:
      _attributes:
        unit: M
      _text: 10240
    systemdisk:
      volume:
        - _attributes:
            name: home
        - _attributes:
            name: root
        - _attributes:
            name: opt
        - _attributes:
            name: srv
        - _attributes:
            name: boot/grub2/i386-pc
        - _attributes:
            name: boot/writable
        - _attributes:
            name: usr/local
        - _attributes:
            name: var
            copy_on_write: "false"
